name: App Stable Release

on:
  push:
    tags:
      - 'app-v*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin cmake pkg-config build-essential libgtk-3-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Linux targets
        run: |
          cd packages/app
          flutter pub get
          dart run dart_pubspec_licenses:generate
          dart run ../packaging/common/gen_extra_licenses.dart
          flutter build linux --release
          cd ../../

          ./packages/packaging/linux/tarball.sh
          ./packages/packaging/linux/appimage.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: packages/packaging/dist/*

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore and create Properties
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > packages/app/android/app/release-keystore.jks
          
          cat <<EOF > packages/app/android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=release
          storeFile=app/release-keystore.jks
          EOF

      - name: Generate Licenses
        run: |
          cd packages/app
          flutter pub get
          dart run dart_pubspec_licenses:generate
          dart run ../packaging/common/gen_extra_licenses.dart

      - name: Build Native Dependencies
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk
        run: ./packages/app/vendor/sonic_audio/build_native_deps_android.sh

      - name: Build Android APKs
        run: ./packages/packaging/linux/android.sh

      - name: Security Cleanup
        if: always()
        run: |
          rm -f packages/app/android/app/release-keystore.jks
          rm -f packages/app/android/key.properties

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-artifacts
          path: packages/packaging/dist/*

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate Checksums
        run: |
          cd artifacts
          sha256sum */* > checksums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: artifacts
          files: |
            linux-artifacts/*
            android-artifacts/*
            checksums.txt