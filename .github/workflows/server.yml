name: Server Registry Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build_push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - name: Extract metadata for Backend
        id: metadata_backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sonic-atlas/sonicatlas-backend
          tags: |
            type=edge
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Extract metadata for Web
        id: metadata_web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sonic-atlas/sonicatlas-web
          tags: |
            type=edge
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and Push Backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          labels: ${{ steps.metadata_backend.outputs.labels }}
          push: true
          tags: ${{ steps.metadata_backend.outputs.tags }}

      - name: Build and Push Web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          labels: ${{ steps.metadata_web.outputs.labels }}
          push: true
          tags: ${{ steps.metadata_web.outputs.tags }}
